name: Build Universal Subtitle Master
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install All AI Dependencies
      run: |
        pip install --upgrade google-generativeai openai pyinstaller

    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --noconsole app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal_AI_Subtitle_Master
        path: dist/app.exe
